name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate starter marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: claude plugin validate .

  test-install:
    name: Test starter marketplace behavior
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Count published plugins
        id: plugin_count
        shell: bash
        run: |
          set -euo pipefail
          count=$(python3 - <<'PY'
          import json
          with open('.claude-plugin/marketplace.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          print(len(data.get('plugins', [])))
          PY
          )
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "Starter marketplace is intentionally empty; skipping install smoke."
          fi

      - name: Select first plugin
        if: steps.plugin_count.outputs.count != '0'
        id: first_plugin
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open('.claude-plugin/marketplace.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          print(f"marketplace={data['name']}")
          print(f"plugin={data['plugins'][0]['name']}")
          PY

      - name: Install plugin
        if: steps.plugin_count.outputs.count != '0'
        run: claude plugin install "${{ steps.first_plugin.outputs.plugin }}@${{ steps.first_plugin.outputs.marketplace }}" --scope user
